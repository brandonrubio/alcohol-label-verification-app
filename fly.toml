# fly.toml app configuration file generated for alcohol-label-verification-app on 2026-06-17T01:52:15Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'alcohol-label-verification-app'
primary_region = 'iad'

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  ADDR = ':8080'
  AI_PROVIDER = 'gemini'
  BATCH_CONCURRENCY = '4'
  GEMINI_MODEL = 'gemini-2.5-flash'
  MAX_UPLOAD_BYTES = '10485760'
  REQUEST_TIMEOUT_SECONDS = '30'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
